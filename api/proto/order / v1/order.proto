syntax = "proto3";

package order.v1;

option go_package = "github.com/vladfc/event-driven-ecommerce-app/gen/order/v1;orderv1";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc ListOrdersByCustomer(ListOrdersByCustomerRequest) returns (ListOrdersByCustomerResponse);
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PENDING = 1;
  ORDER_STATUS_AWAITING_PAYMENT = 2;
  ORDER_STATUS_CONFIRMED = 3;
  ORDER_STATUS_CANCELLED = 4;
  ORDER_STATUS_SHIPPED = 5;
  ORDER_STATUS_COMPLETED = 6;
}

enum Currency {
  CURRENCY_UNSPECIFIED = 0;
  CURRENCY_USD = 1;
  CURRENCY_EUR = 2;
}

message Money {
  Currency currency = 1;
  int64 amount_cents = 2;
}

message OrderItem {
  string product_id = 1;
  string sku = 2;
  string product_name = 3;
  int32 quantity = 4;
  Money unit_price = 5;
  Money total_price = 6;
}

message CreateOrderItem {
  string product_id = 1;
  string sku = 2;
  int32 quantity = 3;
}

message Address {
  string country = 1;
  string city = 2;
  string street = 3;
  string postal_code = 4;
  string house = 5;
  string apartment = 6;
}

message Order {
  string order_id = 1;
  string customer_id = 2;
  repeated OrderItem items = 3;
  Money total_amount = 4;
  OrderStatus status = 5;
  Address shipping_address = 6;
  string created_at = 7;
  string updated_at = 8;
}

message CreateOrderRequest {
  string customer_id = 1;
  repeated CreateOrderItem items = 2;
  Address shipping_address = 3;
  string idempotency_key = 4;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message CancelOrderRequest {
  string order_id = 1;
  string reason = 2;
}

message CancelOrderResponse {
  Order order = 1;
}

message ListOrdersByCustomerRequest {
  string customer_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListOrdersByCustomerResponse {
  repeated Order orders = 1;
  int32 page = 2;
  int32 page_size = 3;
  int64 total = 4;
}
